name: Daily Agri Price Update

on:
  schedule:
    # 08:00 ICT = 01:00 UTC  (primary)
    - cron: "0 1 * * *"
    # 10:00 ICT = 03:00 UTC  (backup — fires if primary was delayed/skipped)
    - cron: "0 3 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit generated HTML

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── 2. Set up Python ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run scraper + HTML generator ──────────────
      - name: Generate dashboard
        run: python generate_html.py --out docs/index.html
        # On failure (website unreachable), scraper uses fallback values
        # so this step should almost never hard-fail

      # ── 5. Commit & push if anything changed ─────────
      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update agri prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      # ── 6. Trigger Netlify redeploy ───────────────────
      - name: Trigger Netlify deploy
        if: env.NETLIFY_DEPLOY_HOOK != ''
        env:
          NETLIFY_DEPLOY_HOOK: ${{ secrets.NETLIFY_DEPLOY_HOOK }}
        run: |
          curl -s -X POST "$NETLIFY_DEPLOY_HOOK" \
            -d '{"clear_cache":false}' \
            -H "Content-Type: application/json"
          echo "Netlify deploy triggered"
